<!-- 1. SECURE PAYMENT MODAL (NEW & RESPONSIVE) -->
    <div id="modal-payment" class="modal-overlay" onclick="closeModalOnOutsideClick(event)">
        <div class="modal-content" style="max-width: 450px; text-align: center; display: flex; flex-direction: column; max-height: 90vh;">
            
            <!-- Modal Header (Fixed at top) -->
            <div class="modal-header" style="justify-content: center; position: relative; background: #1e293b; border-bottom: 1px solid var(--border-color); flex-shrink: 0;">
                <h3 style="font-size: 1.5rem; display: flex; align-items: center; gap: 8px;">
                    <i data-feather="lock" style="color: #22c55e;"></i> Secure Checkout
                </h3>
                <button class="modal-close" onclick="closeModal('modal-payment')" style="position: absolute; right: 20px; top: 24px;"><i data-feather="x"></i></button>
            </div>
            
            <!-- Modal Body (Scrollable if needed) -->
            <div class="modal-body" style="padding: 20px 15px; background: var(--bg-dark); overflow-y: auto; flex-grow: 1;">
                
                <h4 style="color: var(--cyan); margin-bottom: 5px; font-size: 1.05rem;" id="pay-course-name">Course Name</h4>
                <div style="font-size: 2.2rem; font-weight: 800; color: var(--orange); margin-bottom: 15px;">₹<span id="pay-amount">0</span></div>
                
                <!-- QR CODE IMAGE (Responsive sizing) -->
                <div style="background: white; padding: 10px; border-radius: 12px; display: inline-block; margin-bottom: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                    <img src="qr-code.jpg" alt="PhonePe QR Code" style="width: 100%; max-width: 220px; max-height: 30vh; object-fit: contain; display: block; margin: 0 auto;">
                </div>
                
                <p style="font-weight: 800; font-size: 1.1rem; margin-bottom: 2px; letter-spacing: 1px;">DEEPANSHU KUSHWAHA</p>
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px;">Scan using PhonePe, GPay, or Paytm</p>
                
                <!-- Instructions -->
                <div style="background: rgba(34, 197, 94, 0.1); border: 1px dashed rgba(34, 197, 94, 0.4); padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: left;">
                    <p style="font-size: 0.9rem; color: #4ade80; margin: 0; display: flex; align-items: flex-start; gap: 10px;">
                        <i data-feather="check-circle" style="width: 18px; flex-shrink: 0; margin-top: 2px;"></i>
                        <span><strong>Step 2:</strong> After payment, click the button below and send us the payment screenshot to instantly unlock your access.</span>
                    </p>
                </div>
                
                <!-- WhatsApp Button -->
                <a id="whatsapp-confirm-btn" href="#" target="_blank" class="btn btn-primary" style="width: 100%; background-color: #25D366; box-shadow: 0 0 15px rgba(37, 211, 102, 0.4); padding: 14px 10px;">
                    <i data-feather="message-circle"></i> Send Screenshot on WhatsApp
                </a>
            </div>
            
        </div>
    </div>
